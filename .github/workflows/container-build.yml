name: Container Build, SBOM & Sign

# Validation (build + smoke test) runs on PRs too, so a broken container is
# caught before merge, not after. Publication (push/SBOM/sign/attest) is
# restricted to real commits on main and manual runs -- see the `publish`
# job's `if:` condition, which is the actual enforcement, not this trigger
# list alone.
on:
  pull_request:
    branches: [main]
    paths: &container-paths
      - "Dockerfile"
      - ".dockerignore"
      - "requirements.txt"
      - "main.py"
      - "findings.py"
      - "finding_adapters.py"
      - "scanner/**"
      - "classifier/**"
      - "code_analysis/**"
      - "analyzer/**"
      - "dashboard/**"
      - ".github/workflows/container-build.yml"
      - ".github/actions/container-validate/**"
  push:
    branches: [main]
    paths: *container-paths
  workflow_dispatch: {}

jobs:
  validate:
    # Runs for every trigger above: pull_request, push to main, and manual
    # dispatch. Never touches GHCR -- no login, no push, no SBOM, no
    # signing -- so a PR from any contributor can run this safely.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Lowercase repository name
        # GHCR requires an all-lowercase image path; github.repository
        # preserves the repo's actual casing (serewicz/HarvestGuard).
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image reference
        id: image
        run: echo "ref=ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and validate
        uses: ./.github/actions/container-validate
        with:
          image-ref: ${{ steps.image.outputs.ref }}

  publish:
    # Only reached for push-to-main and manual dispatch -- never for
    # pull_request, which is the actual guarantee that publication can't
    # happen from a PR. `needs: validate` additionally means this job does
    # not even start unless validation already passed for this exact
    # commit; it then builds and validates that same commit again as its
    # own independent check immediately before anything gets pushed,
    # rather than trusting a handoff from a prior job.
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for keyless cosign signing via GitHub's OIDC token
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Lowercase repository name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image reference
        id: image
        run: echo "ref=ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and validate
        uses: ./.github/actions/container-validate
        with:
          image-ref: ${{ steps.image.outputs.ref }}

      - name: Log in to GitHub Container Registry
        # Only reachable after validation above has succeeded twice (once
        # in the validate job, once again here) -- no GHCR credentials are
        # ever loaded into a job that a pull_request event can trigger.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push "${{ steps.image.outputs.ref }}"

      - name: Resolve pushed image digest
        id: build
        run: |
          digest=$(docker buildx imagetools inspect "${{ steps.image.outputs.ref }}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX)
        run: |
          syft "ghcr.io/${{ steps.repo.outputs.name }}@${{ steps.build.outputs.digest }}" \
            -o cyclonedx-json=sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, via GitHub OIDC -- no private key to manage or leak)
        run: |
          cosign sign --yes "ghcr.io/${{ steps.repo.outputs.name }}@${{ steps.build.outputs.digest }}"

      - name: Attach signed SBOM attestation
        run: |
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json \
            "ghcr.io/${{ steps.repo.outputs.name }}@${{ steps.build.outputs.digest }}"
