name: Container Build, SBOM & Sign

# Only runs when the image itself could have changed -- not on every push,
# and not on PRs. Signing corresponds to real commits on main, not
# transient PR builds.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "requirements.txt"
      - "main.py"
      - "findings.py"
      - "finding_adapters.py"
      - "scanner/**"
      - "analyzer/**"
      - "classifier/**"
      - "code_analysis/**"
      - "dashboard/**"
      - ".github/workflows/container-build.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write # required for keyless cosign signing via GitHub's OIDC token

jobs:
  build-sign-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Lowercase repository name
        # GHCR requires an all-lowercase image path; github.repository
        # preserves the repo's actual casing (serewicz/HarvestGuard).
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image reference
        id: image
        run: echo "ref=ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local only -- not pushed until the smoke test passes)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.image.outputs.ref }}

      - name: Runtime smoke test -- import check
        # The health endpoint alone does NOT catch this class of bug: it
        # only proves the web server process is alive, not that main.py's
        # script executes successfully. Streamlit only actually runs the
        # script once a real browser session connects over WebSocket -- a
        # plain `curl /` never triggers it. That gap is exactly how a
        # ModuleNotFoundError reachable from every scanner import shipped
        # through this workflow with a fully green run: build, sign, and
        # publish all succeeded because nothing ever imported main.py
        # inside the image. Confirmed by testing this exact check against
        # both the broken image (exit 1) and the fixed one (exit 0) before
        # relying on it.
        run: |
          set -uo pipefail
          IMAGE="${{ steps.image.outputs.ref }}"

          if ! docker run --rm --entrypoint python "$IMAGE" -c "import main" > import_check.log 2>&1; then
            echo "::error::main.py failed to import inside the container"
            cat import_check.log
            exit 1
          fi
          echo "main.py and all reachable scanner imports succeeded"

      - name: Runtime smoke test -- container run + health endpoint
        run: |
          set -uo pipefail
          IMAGE="${{ steps.image.outputs.ref }}"
          NAME="hg-smoke-test"

          docker run -d --name "$NAME" --read-only --tmpfs /tmp -p 8501:8501 "$IMAGE"

          health_status=1
          for i in $(seq 1 30); do
            if [ "$(docker inspect -f '{{.State.Running}}' "$NAME" 2>/dev/null)" != "true" ]; then
              echo "::error::Container exited early"
              break
            fi
            if curl -sf http://localhost:8501/_stcore/health >/dev/null 2>&1; then
              echo "Health check passed after ${i}s"
              health_status=0
              break
            fi
            sleep 1
          done

          if [ "$health_status" -ne 0 ]; then
            echo "::error::Container smoke test failed"
            docker logs "$NAME" || true
          fi

          docker rm -f "$NAME" >/dev/null 2>&1 || true
          exit "$health_status"

      - name: Push image (only reached if the smoke test passed)
        run: docker push "${{ steps.image.outputs.ref }}"

      - name: Resolve pushed image digest
        id: build
        run: |
          digest=$(docker buildx imagetools inspect "${{ steps.image.outputs.ref }}" --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX)
        run: |
          syft "ghcr.io/${{ steps.repo.outputs.name }}@${{ steps.build.outputs.digest }}" \
            -o cyclonedx-json=sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, via GitHub OIDC -- no private key to manage or leak)
        run: |
          cosign sign --yes "ghcr.io/${{ steps.repo.outputs.name }}@${{ steps.build.outputs.digest }}"

      - name: Attach signed SBOM attestation
        run: |
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json \
            "ghcr.io/${{ steps.repo.outputs.name }}@${{ steps.build.outputs.digest }}"
