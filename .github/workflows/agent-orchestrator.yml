name: Agent Orchestrator

# Manual-only, read-only supervised run. No repository-write permissions, no
# secrets, no AI API calls -- see .github/workflows/ci.yml for the normal
# push/pull_request CI this reuses the Python setup and dependency install
# approach from.
#
# V2 adds a required issue_number input and reads that issue via `gh`, using
# only the ephemeral, automatically-provided GITHUB_TOKEN (no secret added).
# The issue body is untrusted, scanner-adjacent text: it is only ever piped
# through `jq -r` and printed to the log below. It is never interpolated
# into a `${{ }}` expression (the classic Actions script-injection vector)
# and never passed to eval/sh, so nothing in it can execute as a command.
#
# V2.5 adds a policy gate: .agent-policy.yml (see docs/AGENT_CONTRACT.md for
# the human-readable contract it implements) must exist, parse as YAML, and
# satisfy a small set of required values before the workflow does anything
# else -- dependency install and tests never run if the gate fails.
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to process"
        required: true
        type: number

permissions:
  contents: read
  issues: read

jobs:
  orchestrate:
    name: Agent Orchestrator
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate agent policy
        run: |
          set -euo pipefail

          if [ ! -f .agent-policy.yml ]; then
            echo "::error::.agent-policy.yml is missing. Refusing to run without an agent policy in place."
            exit 1
          fi

          # A minimal, transient install used only to parse the policy file
          # itself -- distinct from, and gating, the project's own
          # requirements.txt/requirements-dev.txt installed later.
          python3 -m pip install --quiet pyyaml

          python3 - <<'PYEOF'
          import sys

          import yaml

          try:
              with open(".agent-policy.yml") as f:
                  policy = yaml.safe_load(f)
          except yaml.YAMLError as exc:
              print(f"::error::.agent-policy.yml is not valid YAML: {exc}")
              sys.exit(1)

          if not isinstance(policy, dict):
              print("::error::.agent-policy.yml did not parse to a mapping.")
              sys.exit(1)

          def get(path):
              node = policy
              for key in path.split("."):
                  if not isinstance(node, dict) or key not in node:
                      return None
                  node = node[key]
              return node

          # Required minimum: no-autonomous-merge and no-external-model
          # customer-data leakage are the two guarantees this workflow's own
          # governance depends on -- see docs/AGENT_CONTRACT.md's "Merge
          # contract" and "External data" sections.
          checks = {
              "merge.automatic": (get("merge.automatic"), False),
              "merge.human_approval_required": (get("merge.human_approval_required"), True),
              "security.allow_customer_data_to_external_models": (
                  get("security.allow_customer_data_to_external_models"), False
              ),
          }

          failures = [
              f"{path}: expected {expected!r}, got {actual!r}"
              for path, (actual, expected) in checks.items()
              if actual is not expected
          ]

          if failures:
              print("::error::.agent-policy.yml failed required checks:")
              for failure in failures:
                  print(f"::error::  {failure}")
              sys.exit(1)

          print("Agent policy validated:")
          for path, (actual, _expected) in checks.items():
              print(f"  {path} = {actual}")
          PYEOF

      - name: Validate issue number input
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          if [ -z "${ISSUE_NUMBER:-}" ]; then
            echo "::error::issue_number input was not provided."
            exit 1
          fi
          if ! [[ "$ISSUE_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::issue_number must be a positive integer, got: $ISSUE_NUMBER"
            exit 1
          fi

      - name: Retrieve and print issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPO: ${{ github.repository }}
        run: |
          if ! gh issue view "$ISSUE_NUMBER" --repo "$REPO" \
              --json number,title,state,url,body > issue.json 2> issue.err; then
            echo "::error::Unable to retrieve issue #$ISSUE_NUMBER from $REPO (it may not exist, or may not be readable with issues: read)."
            cat issue.err
            exit 1
          fi

          echo "::group::Issue #$ISSUE_NUMBER"
          echo "Issue number: $(jq -r '.number' issue.json)"
          echo "Title: $(jq -r '.title' issue.json)"
          echo "State: $(jq -r '.state' issue.json)"
          echo "URL: $(jq -r '.url' issue.json)"
          echo "Body:"
          # Untrusted text, printed as plain log output only -- see the
          # workflow-level comment above for why this is safe.
          jq -r '.body // "(no body)"' issue.json
          echo "::endgroup::"

          rm -f issue.json issue.err

      - name: Print run context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Triggering actor: ${{ github.actor }}"
          echo "Git ref: ${{ github.ref }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -v
