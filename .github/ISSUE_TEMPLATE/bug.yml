name: Bug
description: Report behavior that is incorrect, unsafe, incomplete, or misleading.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. GitHub Issues are HarvestGuard's source of truth for bug scope and acceptance criteria. Do not include credentials, real secrets, raw sensitive data, or confidential target details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What behavior should this bug fix include?
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What should this bug fix explicitly not change?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for the bug to be considered fixed?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include scan type, target shape, command or UI action, and redacted output.
      placeholder: |
        1. Scan type:
        2. Target shape:
        3. Command or UI action:
        4. Result:
    validations:
      required: true
  - type: dropdown
    id: scan_type
    attributes:
      label: Scan type
      options:
        - Local filesystem
        - Local filesystem sensitive data
        - AWS S3
        - GCS
        - Azure Blob
        - Dashboard
        - Reports
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, HarvestGuard commit, container/runtime details.
      placeholder: |
        OS:
        Python:
        HarvestGuard commit:
        Container/runtime:
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, traceback, screenshots, or redacted sample output.
    validations:
      required: false
  - type: textarea
    id: testing
    attributes:
      label: Testing requirements
      description: Regression, fixture, integration, documentation, or manual validation requirements.
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Documentation impact
      description: Which docs, examples, roadmap notes, or user-facing claims must change? Use "None" if not applicable.
    validations:
      required: true
  - type: checkboxes
    id: local-first
    attributes:
      label: Local-first and scope checks
      options:
        - label: The expected fix preserves local-first behavior.
          required: true
        - label: The expected fix does not add telemetry or a HarvestGuard-operated outbound service by default.
          required: true
        - label: The expected fix keeps observed evidence separate from inferred risk or priority.
          required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and security notes
      description: Confirm anything sensitive has been redacted.
      placeholder: "I have redacted credentials, real secrets, sensitive paths, bucket names, object names, and confidential sample data."
    validations:
      required: true
